<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 520px;
            height: 380px;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa, #e0e5ec);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(52, 152, 219, 0.1);
            animation: float 25s infinite linear;
        }
        
        .circle:nth-child(1) {
            width: 180px;
            height: 180px;
            left: -80px;
            top: -80px;
        }
        
        .circle:nth-child(2) {
            width: 120px;
            height: 120px;
            right: -40px;
            bottom: -30px;
            background: rgba(41, 128, 185, 0.1);
        }
        
        .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 40px;
        }
        
        .arrow:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 2px;
            background: rgba(52, 152, 219, 0.7);
            transform: translate(-50%, -50%);
        }
        
        .arrow:after {
            content: "";
            position: absolute;
            top: 50%;
            right: 0;
            width: 15px;
            height: 15px;
            border-top: 2px solid rgba(52, 152, 219, 0.7);
            border-right: 2px solid rgba(52, 152, 219, 0.7);
            transform: translateY(-50%) rotate(45deg);
        }
        
        .app-text {
            position: absolute;
            top: 260px;
            left: 150px;
            font-size: 14px;
            color: #2c3e50;
            text-align: center;
        }
        
        .folder-text {
            position: absolute;
            top: 260px;
            left: 380px;
            font-size: 14px;
            color: #2c3e50;
            text-align: center;
        }
        
        .title {
            position: absolute;
            top: 50px;
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            background: linear-gradient(to right, #3498db, #2980b9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
            z-index: 2;
        }
        
        .subtitle {
            position: absolute;
            top: 85px;
            font-size: 14px;
            color: #7f8c8d;
            z-index: 2;
        }
        
        @keyframes float {
            0% {
                transform: rotate(0deg) translate(5px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translate(5px) rotate(-360deg);
            }
        }
    </style>
</head>
<body>
    <div class="circles">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="title">iconsize 3.0.0</div>
    <div class="subtitle">快速生成各平台所需的应用图标</div>
    
    <div class="arrow"></div>
    
    <div class="app-text">将应用拖动到<br>这里安装</div>
    <div class="folder-text">应用程序<br>文件夹</div>
</body>
</html>
